services:
  lighthouse:
    image: petabridge/lighthouse:latest
    environment:
      ACTORSYSTEM: vidar
      CLUSTER_IP: lighthouse
      CLUSTER_PORT: "4053"
      CLUSTER_SEEDS: akka.tcp://vidar@lighthouse:4053
    # Adds the Split Brain Resolver to lighthouse's Akka config (it's usually the leader).
    volumes:
      - ./docker/lighthouse/akka.hocon:/app/akka.hocon:ro
    restart: unless-stopped

  vidar-host:
    build:
      context: .
      dockerfile: src/Vidar.Host/Dockerfile
    ports:
      - "5280:8080"
    depends_on:
      - mongodb
      - emqx
      - lighthouse
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-host
      - VIDAR_MONGO_CONNECTION=mongodb://mongodb:27017
      - VIDAR_MONGO_DATABASE=vidar
      - DREO2MQTT_URL=http://dreo2mqtt:8896
      - LOXONE2MQTT_URL=http://loxone2mqtt:8897

  vidar-comm-shelly:
    build:
      context: .
      dockerfile: src/Vidar.Communication.Shelly/Dockerfile
    depends_on:
      - lighthouse
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-shelly
      - VIDAR_AKKA_PORT=4054

  vidar-comm-zigbee2mqtt:
    build:
      context: .
      dockerfile: src/Vidar.Communication.Zigbee2Mqtt/Dockerfile
    depends_on:
      - lighthouse
    env_file:
      - .env
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-zigbee2mqtt
      - VIDAR_AKKA_PORT=4055
      - VIDAR_MQTT_HOST=10.220.220.10
      - VIDAR_MQTT_PORT=2884
      - VIDAR_MQTT_USER=${MQTT_USER}
      - VIDAR_MQTT_PASSWORD=${MQTT_PASSWORD}
      - VIDAR_Z2M_BASE_TOPIC=smarthome/z2m

  vidar-comm-unifi:
    build:
      context: .
      dockerfile: src/Vidar.Communication.UniFi/Dockerfile
    depends_on:
      - lighthouse
    env_file:
      - .env
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-unifi
      - VIDAR_AKKA_PORT=4056
      - VIDAR_UNIFI_HOST=${UNIFI_HOST}
      - VIDAR_UNIFI_API_KEY=${UNIFI_API_KEY}
      - VIDAR_UNIFI_SITE_ID=${UNIFI_SITE_ID:-default}
      - VIDAR_UNIFI_POLL_INTERVAL=30
      - VIDAR_HOST_URL=http://vidar-host:8080

  vidar-comm-homeconnect:
    build:
      context: .
      dockerfile: src/Vidar.Communication.HomeConnect/Dockerfile
    depends_on:
      - lighthouse
    env_file:
      - .env
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-homeconnect
      - VIDAR_AKKA_PORT=4057

  vidar-comm-e3dc:
    build:
      context: .
      dockerfile: src/Vidar.Communication.E3dc/Dockerfile
    depends_on:
      - lighthouse
    env_file:
      - .env
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-e3dc
      - VIDAR_AKKA_PORT=4058

  vidar-comm-ecowitt:
    build:
      context: .
      dockerfile: src/Vidar.Communication.Ecowitt/Dockerfile
    depends_on:
      - lighthouse
      - emqx
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-ecowitt
      - VIDAR_AKKA_PORT=4061

  vidar-comm-dyson:
    build:
      context: .
      dockerfile: src/Vidar.Communication.Dyson/Dockerfile
    depends_on:
      lighthouse:
        condition: service_started
      emqx:
        condition: service_started
      vidar-host:
        condition: service_healthy
    restart: unless-stopped
    # Dyson's newer devices are cloud-only (AWS IoT). The standalone dyson2mqtt sidecar
    # bridges them onto the local broker; this worker consumes that broker.
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-dyson
      - VIDAR_AKKA_PORT=4059
      - VIDAR_MQTT_HOST=emqx
      - VIDAR_MQTT_PORT=1883
      - VIDAR_DYSON_BASE_TOPIC=dyson2mqtt

  dyson2mqtt:
    build:
      context: ./tools/dyson2mqtt
    depends_on:
      - emqx
      - mongodb
    # Standalone Dyson cloud (AWS IoT) -> MQTT bridge, like zigbee2mqtt. Reads the account
    # token + device list from Mongo (populated by Vidar onboarding) and republishes device
    # state to the broker under dyson2mqtt/<serial>. Broker is fully configurable via env.
    environment:
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
      - MQTT_BASE_TOPIC=dyson2mqtt
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=vidar
    restart: unless-stopped

  vidar-comm-roborock:
    build:
      context: .
      dockerfile: src/Vidar.Communication.Roborock/Dockerfile
    depends_on:
      lighthouse:
        condition: service_started
      emqx:
        condition: service_started
      vidar-host:
        condition: service_healthy
    restart: unless-stopped
    # Roborock vacuums are bridged to the local MQTT broker by the standalone roborock2mqtt
    # sidecar (local-first/cloud-fallback via python-roborock). This worker consumes that broker.
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-roborock
      - VIDAR_AKKA_PORT=4060
      - VIDAR_MQTT_HOST=emqx
      - VIDAR_MQTT_PORT=1883
      - VIDAR_ROBOROCK_BASE_TOPIC=roborock2mqtt

  roborock2mqtt:
    build:
      context: ./tools/roborock2mqtt
    depends_on:
      - emqx
      - mongodb
    # Standalone Roborock account -> MQTT bridge, like dyson2mqtt. Reads account creds + device
    # manifest from Mongo (populated by Vidar onboarding) and republishes device state to the
    # broker under roborock2mqtt/<duid>. ROBOROCK_ONBOARD_HTTP=1 also serves the onboarding
    # auth endpoints the host calls at http://roborock2mqtt:8895 (see ROBOROCK2MQTT_URL).
    environment:
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
      - MQTT_BASE_TOPIC=roborock2mqtt
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=vidar
      - ROBOROCK_ONBOARD_HTTP=1
    restart: unless-stopped

  vidar-comm-bambu:
    build:
      context: .
      dockerfile: src/Vidar.Communication.Bambu/Dockerfile
    depends_on:
      lighthouse:
        condition: service_started
      vidar-host:
        condition: service_healthy
    restart: unless-stopped
    # Bambu printers run their own local MQTT broker; this worker connects directly to each
    # printer (no sidecar, no EMQX). It needs LAN reachability to the printers and ffmpeg for snapshots.
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-bambu
      - VIDAR_AKKA_PORT=4062

  vidar-comm-dreo:
    build:
      context: .
      dockerfile: src/Vidar.Communication.Dreo/Dockerfile
    depends_on:
      lighthouse:
        condition: service_started
      emqx:
        condition: service_started
      vidar-host:
        condition: service_healthy
    restart: unless-stopped
    # Dreo ceiling fans are cloud-only. The standalone dreo2mqtt sidecar bridges them
    # onto the local broker via the Dreo cloud WebSocket; this worker consumes that broker.
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-dreo
      - VIDAR_AKKA_PORT=4063
      - VIDAR_MQTT_HOST=emqx
      - VIDAR_MQTT_PORT=1883
      - VIDAR_DREO_BASE_TOPIC=dreo2mqtt

  vidar-comm-spotify:
    build:
      context: .
      dockerfile: src/Vidar.Communication.Spotify/Dockerfile
    depends_on:
      - lighthouse
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-spotify
      - VIDAR_AKKA_PORT=4065
      - VIDAR_SPOTIFY_TOKEN_PATH=/data/spotify-token.json
    volumes:
      - vidar-spotify-data:/data

  dreo2mqtt:
    build:
      context: ./tools/dreo2mqtt
    depends_on:
      - emqx
      - mongodb
    # Standalone Dreo cloud (WebSocket) -> MQTT bridge, like dyson2mqtt. Reads the account
    # token + device manifest from Mongo (populated by Vidar onboarding) and republishes each
    # fan's state to dreo2mqtt/<serial>. DREO_ONBOARD_HTTP=1 also serves the onboarding auth
    # endpoint the host calls at http://dreo2mqtt:8896 (see DREO2MQTT_URL).
    environment:
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
      - MQTT_BASE_TOPIC=dreo2mqtt
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=vidar
      - DREO_ONBOARD_HTTP=1
    restart: unless-stopped

  vidar-comm-loxone:
    build:
      context: .
      dockerfile: src/Vidar.Communication.Loxone/Dockerfile
    depends_on:
      lighthouse:
        condition: service_started
      emqx:
        condition: service_started
      vidar-host:
        condition: service_healthy
    restart: unless-stopped
    # Loxone Miniservers are reached over a local WebSocket; the standalone loxone2mqtt sidecar
    # bridges them onto the local broker. This worker consumes that broker.
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-loxone
      - VIDAR_AKKA_PORT=4064
      - VIDAR_MQTT_HOST=emqx
      - VIDAR_MQTT_PORT=1883
      - VIDAR_LOXONE_BASE_TOPIC=loxone2mqtt

  loxone2mqtt:
    build:
      context: ./tools/loxone2mqtt
    depends_on:
      - emqx
      - mongodb
    # Standalone Loxone Miniserver (local WebSocket) -> MQTT bridge, like dreo2mqtt. Reads the
    # Miniserver credentials + structure from Mongo (populated by Vidar onboarding) and republishes
    # each control's state to loxone2mqtt/<serial>/<uuid>. LOXONE_ONBOARD_HTTP=1 also serves the
    # onboarding endpoint the host calls at http://loxone2mqtt:8897 (see LOXONE2MQTT_URL).
    environment:
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
      - MQTT_BASE_TOPIC=loxone2mqtt
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=vidar
      - LOXONE_ONBOARD_HTTP=1
      - LOXONE_ONBOARD_PORT=8897
    restart: unless-stopped

  mongodb:
    image: mongo:8
    volumes:
      - vidar-mongo-data:/data/db
    ports:
      - "5281:27017"

  emqx:
    image: emqx/emqx:latest
    volumes:
      - vidar-emqx-data:/opt/emqx/data
    ports:
      - "5282:1883"
      - "5283:18083"

volumes:
  vidar-mongo-data:
  vidar-emqx-data:
  vidar-spotify-data:
