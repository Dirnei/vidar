services:
  lighthouse:
    image: petabridge/lighthouse:latest
    environment:
      ACTORSYSTEM: vidar
      CLUSTER_IP: lighthouse
      CLUSTER_PORT: "4053"
      CLUSTER_SEEDS: akka.tcp://vidar@lighthouse:4053
    restart: unless-stopped

  vidar-host:
    image: ${VIDAR_REGISTRY:-10.220.220.10:5000}/vidar-host:${VIDAR_TAG:-latest}
    ports:
      - "5280:8080"
    depends_on:
      - mongodb
      - lighthouse
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-host
      - VIDAR_MONGO_CONNECTION=mongodb://mongodb:27017
      - VIDAR_MONGO_DATABASE=vidar
    restart: unless-stopped

  vidar-comm-shelly:
    image: ${VIDAR_REGISTRY:-10.220.220.10:5000}/vidar-comm-shelly:${VIDAR_TAG:-latest}
    depends_on:
      - lighthouse
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-shelly
      - VIDAR_AKKA_PORT=4054
    restart: unless-stopped

  vidar-comm-zigbee2mqtt:
    image: ${VIDAR_REGISTRY:-10.220.220.10:5000}/vidar-comm-zigbee2mqtt:${VIDAR_TAG:-latest}
    depends_on:
      - lighthouse
    env_file:
      - .env
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-zigbee2mqtt
      - VIDAR_AKKA_PORT=4055
      - VIDAR_MQTT_HOST=${MQTT_HOST:-10.220.220.10}
      - VIDAR_MQTT_PORT=${MQTT_PORT:-2884}
      - VIDAR_MQTT_USER=${MQTT_USER}
      - VIDAR_MQTT_PASSWORD=${MQTT_PASSWORD}
      - VIDAR_Z2M_BASE_TOPIC=${Z2M_BASE_TOPIC:-smarthome/z2m}
    restart: unless-stopped

  vidar-comm-unifi:
    image: ${VIDAR_REGISTRY:-10.220.220.10:5000}/vidar-comm-unifi:${VIDAR_TAG:-latest}
    depends_on:
      - lighthouse
    env_file:
      - .env
    environment:
      - VIDAR_CLUSTER_SEED=lighthouse:4053
      - VIDAR_HOSTNAME=vidar-comm-unifi
      - VIDAR_AKKA_PORT=4056
      - VIDAR_UNIFI_HOST=${UNIFI_HOST}
      - VIDAR_UNIFI_API_KEY=${UNIFI_API_KEY}
      - VIDAR_UNIFI_SITE_ID=${UNIFI_SITE_ID:-default}
      - VIDAR_UNIFI_POLL_INTERVAL=30
    restart: unless-stopped

  mongodb:
    image: mongo:8
    volumes:
      - vidar-mongo-data:/data/db
    ports:
      - "5281:27017"
    restart: unless-stopped

volumes:
  vidar-mongo-data:
